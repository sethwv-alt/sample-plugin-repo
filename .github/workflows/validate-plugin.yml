name: Validate Plugin

permissions:
  contents: read
  pull-requests: write

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - ready_for_review

jobs:
  # --------------------------------------------------------------------------
  # Job 1: Post a notice on draft PRs — no validation runs yet
  # --------------------------------------------------------------------------
  draft-notice:
    if: github.event.pull_request.draft == true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post draft notice
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          COMMENT="<\!--PLUGIN_VALIDATION_DRAFT_NOTICE-->"
          COMMENT+=$'\n'"This PR is currently a draft. Plugin validation will run once the PR is marked ready for review."
          EXISTING=$(gh pr view $PR_NUMBER --json comments \
            --jq '.comments[] | select(.author.login=="github-actions[bot]") | select(.body | contains("<\!--PLUGIN_VALIDATION_DRAFT_NOTICE-->")) | .id')
          if [ -n "$EXISTING" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/$EXISTING" -X PATCH -f body="$COMMENT"
          else
            gh pr comment $PR_NUMBER --body "$COMMENT"
          fi

  # --------------------------------------------------------------------------
  # Job 2: Detect which plugins changed and build the matrix
  # --------------------------------------------------------------------------
  detect-changes:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      plugin_count: ${{ steps.detect.outputs.plugin_count }}
      close_pr: ${{ steps.detect.outputs.close_pr }}
    steps:
      - name: Checkout PR with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Detect changed plugins
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x .github/scripts/validate/*.sh
          .github/scripts/validate/detect-changes.sh \
            "${{ github.actor }}" \
            "${{ github.event.pull_request.base.ref }}"

  # --------------------------------------------------------------------------
  # Job 3: Validate each plugin in parallel via matrix
  # --------------------------------------------------------------------------
  validate-plugin:
    needs: detect-changes
    if: needs.detect-changes.outputs.close_pr == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout PR with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Validate ${{ matrix.plugin }}
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x .github/scripts/validate/*.sh
          set +e
          .github/scripts/validate/validate.sh \
            "${{ matrix.plugin }}" \
            "${{ github.actor }}" \
            "${{ github.event.pull_request.base.ref }}" \
            "${{ matrix.plugin }}.fragment.md"
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload report fragment
        uses: actions/upload-artifact@v4
        with:
          name: fragment-${{ matrix.plugin }}
          path: ${{ matrix.plugin }}.fragment.md
          if-no-files-found: warn

      - name: Fail step if validation failed
        if: steps.validate.outputs.exit_code != '0'
        run: exit 1

  # --------------------------------------------------------------------------
  # Job 4: Aggregate all fragments, post PR comment, set final status
  # --------------------------------------------------------------------------
  report:
    needs: [detect-changes, validate-plugin]
    if: always() && needs.detect-changes.result == 'success' && needs.detect-changes.outputs.close_pr == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Download all report fragments
        uses: actions/download-artifact@v4
        with:
          pattern: fragment-*
          path: fragments
          merge-multiple: true
        continue-on-error: true

      - name: Aggregate and post comment
        id: report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DISCORD_URL: ${{ vars.DISCORD_URL }}
        run: |
          chmod +x .github/scripts/validate/*.sh
          set +e
          .github/scripts/validate/report.sh \
            "${{ github.event.pull_request.number }}" \
            "${{ github.actor }}" \
            "${{ needs.detect-changes.outputs.plugin_count }}" \
            "false" \
            "fragments"
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Fail workflow if any plugin failed
        if: steps.report.outputs.exit_code != '0'
        run: |
          echo "::error::Plugin validation failed. See PR comment for details."
          exit 1

  # --------------------------------------------------------------------------
  # Job 5: Auto-close unauthorized PRs
  # --------------------------------------------------------------------------
  close-unauthorized:
    needs: detect-changes
    if: always() && needs.detect-changes.result == 'success' && needs.detect-changes.outputs.close_pr == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Post close comment and close PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DISCORD_URL: ${{ vars.DISCORD_URL }}
        run: |
          chmod +x .github/scripts/validate/*.sh
          .github/scripts/validate/report.sh \
            "${{ github.event.pull_request.number }}" \
            "${{ github.actor }}" \
            "${{ needs.detect-changes.outputs.plugin_count }}" \
            "true" \
            "/dev/null"
